# ============================================================
# Home-Hunter Configuration File
# Chỉnh sửa file này để thay đổi cấu hình toàn bộ hệ thống.
# ============================================================

general:
  # Thời gian chờ giữa mỗi lần kiểm tra (giây). 3600 = 1 giờ
  check_interval_seconds: 3600
  # Đường dẫn chromedriver. Để trống để dùng Selenium Manager tự động
  webdriver_path: ""
  log_level: INFO        # DEBUG | INFO | WARNING | ERROR
  headless: true         # true = chạy nền, false = hiện browser (debug)
  disable_images_css: true # Tắt tải hình ảnh, CSS để tiết kiệm cực nhiều RAM
  page_load_timeout: 20  # Giây chờ tải trang tối đa
  delay_between_pages: 1 # Giây nghỉ giữa mỗi trang (lịch sự với server)
  delay_between_searches: 30 # Giây nghỉ giữa các search để VPS giải phóng RAM
  max_pages_per_search: 20 # Giới hạn số trang tối đa mỗi lần quét

# ============================================================
# DANH SÁCH TÌM KIẾM
# Thêm bao nhiêu search cũng được.
# type: rental (thuê nhà) | sale (mua bán/đất)
# enabled: true/false để bật/tắt từng search không cần xóa
# ============================================================
searches:
  - name: "Toyonaka Rental"
    type: rental
    enabled: true
    url: "https://suumo.jp/jj/chintai/ichiran/FR301FC001/?ar=060&bs=040&pc=20&smk=&po1=25&po2=99&shkr1=03&shkr2=03&shkr3=03&shkr4=03&sc=27203&ta=27&cb=4.5&ct=8.0&md=06&md=07&md=08&md=09&md=10&md=11&md=12&md=13&et=9999999&mb=30&mt=9999999&cn=30&fw2="

  - name: "Shonai Mikuni eki Rental"
    type: rental
    enabled: true
    url: "https://suumo.jp/jj/chintai/ichiran/FR301FC001/?url=%2Fchintai%2Fichiran%2FFR301FC001%2F&ar=060&bs=040&pc=20&smk=&po1=25&po2=99&shkr1=03&shkr2=03&shkr3=03&shkr4=03&cb=4.0&ct=7.5&md=06&md=07&md=08&md=09&md=10&md=11&md=12&md=13&md=14&et=9999999&mb=30&mt=9999999&cn=30&ra=027&ek=208036610&ek=208018610&rn=2080&ae=20801"

  # Ví dụ search thứ 2 (đang tắt)
  # - name: "Tokyo Land Sale"
